<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wok This Way - Send Feedbacks</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-blue: #0056b3;
            --accent-blue: #007bff;
            --bg-color: #f0f4f8;
            --text-dark: #2a2a2a;
            --star-gold: #ffc107;
            /* New colors for the header block background */
            --nav-bg: #111b27;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            /* Disables page scrolling to keep layout fixed */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Updated navbar header bar with dark bluish-black styling spanning edge-to-edge */
        .navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--nav-bg);
            padding: 15px 30px;
            box-sizing: border-box;
            border-bottom: 3px solid var(--primary-blue);
        }

        /* White logo typography */
        .navbar .logo h1 {
            margin: 0;
            font-size: 24px;
            color: #ffffff;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 25px;
            padding: 0;
            margin: 0;
        }

        /* Nav links forced to clean white text */
        .nav-links a {
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            transition: color 0.2s ease-in-out;
        }

        /* Slight hover glow effect for links */
        .nav-links a:hover {
            color: var(--accent-blue);
        }

        /* Main layout element wrapper spacing adjusting for the navbar padding */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 25px;
        }

        h1.main-title {
            color: var(--primary-blue);
            text-align: left;
            margin: 0 0 4px 0;
            font-size: 26px;
        }

        p.subtitle {
            text-align: left;
            color: #666;
            margin: 0 0 20px 0;
            font-size: 15px;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
            border-left: 8px solid var(--primary-blue);
            box-sizing: border-box;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 0;
        }

        form {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            resize: none;
            height: 85px;
        }

        .rating-group {
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            font-size: 28px;
        }

        .rating-group input {
            display: none;
        }

        .rating-group label {
            cursor: pointer;
            color: #ccc;
            transition: color 0.2s;
            margin: 0;
        }

        .rating-group label:hover,
        .rating-group label:hover~label {
            color: var(--star-gold);
        }

        .rating-group input:checked~label {
            color: var(--star-gold);
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #004085;
        }

        footer {
    background-color: #1e293b;
    color: #cbd5e1;
    text-align: center;
    padding: 1rem;
    margin-top: auto;
    font-size: 0.9rem;
}
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <h1>Wok This Way</h1>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="FAMOUSFOODS.html">Famous Foods</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
            <li><a href="ourmenu.html">Our Menu</a></li>
            <li><a href="ourfeedbacks.html">Our Feedbacks</a></li>
            <li><a href="sendfeedbacks.html">Send Feedback</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="main-title">SHARE YOUR KITCHEN EXPERIENCE</h1>
        <p class="subtitle">Did our recipes spice up your cooking? Send us your review below!</p>

        <div class="form-container">
            <form id="sendFeedbackForm">
                <div class="form-grid">

                    <div class="form-group full-width">
                        <label>How would you rate our Chinese food recipes?</label>
                        <div class="rating-group">
                            <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                            <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                            <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                            <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                            <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="dish">What was the last dish you cooked from us?</label>
                        <input type="text" id="dish" name="dish" placeholder="e.g., Kung Pao Chicken" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="feedback">How can we improve or what would you like to see next?</label>
                        <textarea id="feedback" name="feedback"
                            placeholder="Share your cooking experience or suggest a recipe..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="name">Your Name (Optional)</label>
                        <input type="text" id="name" name="name" placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Your Email (Optional)</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com">
                    </div>
                </div>

                <button type="submit">Submit Feedback</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 MyWebsite. All rights reserved MUHAMMAD HADI ALI KHAN.</p>
    </footer>

    <script>
        document.getElementById('sendFeedbackForm').addEventListener('submit', function (event) {
            event.preventDefault();
            const ratingSelected = document.querySelector('input[name="rating"]:checked');
            const ratingValue = ratingSelected ? ratingSelected.value : 'No rating';
            const nameValue = document.getElementById('name').value || 'Anonymous';
            alert('Thank you, ' + nameValue + '! Your ' + ratingValue + '-star feedback was submitted successfully.');
            this.reset();
        });
    </script>
</body>

</html>
