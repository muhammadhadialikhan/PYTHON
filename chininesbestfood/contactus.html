<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary-blue: #0056b3;
            --accent-blue: #007bff;
            --bg-color: #f0f4f8;
            --text-dark: #2a2a2a;
            --nav-bg: #111b27;
            /* Added matching dark blue-black for the footer bar background */
            --footer-bg: #111b27;
        }

        /* FIXED HEIGHT CRASH: Changed height to min-height and allowed full scrolling */
        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* MATCHED PREMIUM COOL NAVBAR SYSTEM */
        .navbar {
            width: 100%;
            position: sticky;
            top: 0;
            left: 0;
            z-index: 99999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 30px;
            box-sizing: border-box;
            background-color: #111b27 !important;
            border-bottom: 4px solid var(--primary-blue);
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.15);
        }

        /* Cool Gradient Brand Logo Accent */
        .navbar .logo h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navigation Links Wrapper Layout */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            padding: 0;
            margin: 0;
        }

        /* Cool Links Layout with Custom Underlines */
        .nav-links a {
            text-decoration: none;
            color: #ffffff !important;
            font-weight: 600;
            font-size: 16px;
            padding: 6px 0;
            position: relative;
            transition: color 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .nav-links a:hover {
            color: #007bff !important;
        }

        /* Cool Animated Underline Sliding Effect */
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #007bff;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        main.content {
            width: 95%;
            max-width: 1200px;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 0;
            box-sizing: border-box;
        }

        h2 {
            color: var(--primary-blue);
            text-align: left;
            margin: 0 0 20px 0;
            font-size: 32px;
            font-weight: 800;
        }

        .contact-form {
            background-color: #ffffff;
            width: 100%;
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
            border-left: 12px solid var(--primary-blue);
            box-sizing: border-box;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 1;
        }

        /* Ensures layout matches cleanly on larger screens while responsive on small ones */
        @media (min-width: 768px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-group.full-width {
                grid-column: span 2;
            }
        }

        label {
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 16px;
            text-align: left;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #bbb;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
            background-color: #fafbfc;
            transition: border-color 0.2s, background-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            border-color: var(--accent-blue);
            outline: none;
            background-color: #ffffff;
        }

        textarea {
            resize: none;
            height: 180px;
        }

        button {
            background-color: var(--primary-blue);
            color: white;
            padding: 18px 30px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 30px;
        }

        button:hover {
            background-color: #004085;
        }

        /* Updated footer to span 100% full width from edge to edge with a background color */
        footer {
            width: 100%;
            background-color: var(--footer-bg);
            color: #ffffff;
            /* Changed to white text to read easily on dark block */
            font-size: 14px;
            text-align: center;
            /* Centers the wording exactly */
            padding: 24px 0;
            /* Vertical breathing space inside the bar */
            box-sizing: border-box;
            border-top: 4px solid var(--primary-blue);
            /* Matches the navigation bar border setup */
            margin-top: 60px;
        }

        footer p {
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <h1>Wok This Way</h1>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="FAMOUSFOODS.html">Famous Foods</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
            <li><a href="ourmenu.html">Our Menu</a></li>
            <li><a href="ourfeedbacks.html">Our Feedbacks</a></li>
            <li><a href="sendfeedbacks.html">Send Feedback</a></li>
        </ul>
    </nav>

    <main class="content">
        <h2>Contact Us</h2>
        <div class="contact-form">
            <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" placeholder="Your Full Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="message">Message:</label>
                        <textarea id="message" placeholder="Type your message details here..." required></textarea>
                    </div>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Wok This Way. All rights reserved MUHAMMAD HADI ALI KHAN.</p>
    </footer>
</body>

</html>
