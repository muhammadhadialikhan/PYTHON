<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wok This Way - Famous Foods</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 1. GLOBAL LAYOUT FRAMEWORK */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }

        /* FIXED SOLID NAVBAR - NO FROSTED GLASS EFFECT */
        .navbar {
            width: 100%;
            position: sticky;
            top: 0;
            left: 0;
            z-index: 99999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 30px;
            /* Matched exact padding metrics from other sheets */
            box-sizing: border-box;

            /* Changed to a clean, 100% solid dark background color */
            background-color: #111b27 !important;
            border-bottom: 4px solid #0056b3;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.15);
        }

        .navbar .logo h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
            padding: 0;
            margin: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #ffffff !important;
            font-weight: 600;
            font-size: 16px;
            padding: 6px 0;
            position: relative;
            transition: color 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .nav-links a:hover {
            color: #007bff !important;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #007bff;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .nav-links a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* 2. DYNAMIC WORKSPACE CONTENT */
        main {
            flex: 1 0 auto;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        /* Heading Style Accent Setup */
        main h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #111b27 0%, #0056b3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: inline-block;
            margin: 0;
        }

        main h1::after {
            content: '';
            display: block;
            width: 80px;
            height: 5px;
            background: #0056b3;
            margin: 15px auto 0 auto;
            border-radius: 10px;
        }

        /* 3. RESPONSIVE DISH CARD CONTAINER GALLERY */
        section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            margin-top: 60px;
            width: 100%;
        }

        /* Premium Interactive Image Wrapping Frame */
        img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 16px;
            background-color: #e2e8f0;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08),
                0 4px 12px rgba(15, 23, 42, 0.04);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.4s ease,
                filter 0.4s ease;
            cursor: pointer;
        }

        /* Hover Elevation Effects */
        img:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 45px rgba(15, 23, 42, 0.18),
                0 10px 20px rgba(15, 23, 42, 0.1);
            filter: brightness(1.05);
        }

        /* 4. SOLID BASELINE ANCHORED FOOTER */
        footer {
            background-color: #111b27;
            color: #94a3b8;
            text-align: center;
            padding: 30px 20px;
            border-top: 4px solid #0056b3;
            width: 100%;
            box-sizing: border-box;
            margin-top: auto;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        footer p {
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>
